{% extends 'base.html' %}
{% block title %}로그인 — 병동 인수인계{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #0f2d5a 0%, #1a4fa0 50%, #0891b2 100%);">
  <div class="card shadow-lg" style="width:100%;max-width:420px;border-radius:20px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#1a4fa0,#06b6d4);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
          <i class="bi bi-hospital-fill text-white fs-3"></i>
        </div>
        <h4 class="fw-bold mb-0">병동 인수인계 시스템</h4>
        <p class="text-muted small mt-1">Ward Handover Platform</p>
      </div>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">아이디</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input type="text" name="username" class="form-control border-start-0" placeholder="아이디 입력" required autofocus>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">비밀번호</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" name="password" class="form-control border-start-0" placeholder="비밀번호 입력" required>
          </div>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" name="remember" class="form-check-input" id="remember">
          <label class="form-check-label text-muted small" for="remember">로그인 유지</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>로그인
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted small mb-0">
        계정이 없으신가요?
        <a href="{{ url_for('auth.register') }}" class="text-primary fw-500">회원가입</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
